[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "forensicate"
version = "1.0.0"
description = "AI prompt injection detection engine — 87 rules across keyword, regex, and heuristic analysis"
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.10"
authors = [{ name = "Forensicate.ai" }]
keywords = ["ai", "security", "prompt-injection", "llm", "jailbreak", "detection", "owasp"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Security",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Typing :: Typed",
]

[project.urls]
Homepage = "https://forensicate.ai"
Repository = "https://github.com/peterhanily/forensicate.ai"
Issues = "https://github.com/peterhanily/forensicate.ai/issues"

[project.scripts]
forensicate = "forensicate.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/forensicate"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
