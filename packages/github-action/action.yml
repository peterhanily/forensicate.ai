name: 'Forensicate.ai Prompt Injection Scanner'
description: 'Scan files and PR diffs for prompt injection attacks, jailbreaks, and hidden payloads'
author: 'Forensicate.ai'
branding:
  icon: 'shield'
  color: 'yellow'

inputs:
  paths:
    description: 'Glob patterns to scan (space-separated). Default scans changed files in PR.'
    required: false
    default: ''
  confidence-threshold:
    description: 'Minimum confidence percentage to report (0-100)'
    required: false
    default: '50'
  fail-on-finding:
    description: 'Fail the action if injection is detected'
    required: false
    default: 'true'
  scan-mode:
    description: 'What to scan: "changed" (PR diff only), "all" (all matching files)'
    required: false
    default: 'changed'
  comment-on-pr:
    description: 'Post scan results as a PR comment (requires github-token)'
    required: false
    default: 'true'
  sarif-upload:
    description: 'Generate SARIF report and upload to GitHub Security tab'
    required: false
    default: 'false'
  github-token:
    description: 'GitHub token for PR comments and SARIF upload (defaults to GITHUB_TOKEN)'
    required: false
    default: ${{ github.token }}

outputs:
  findings-count:
    description: 'Number of files with detected injections'
  total-files-scanned:
    description: 'Total number of files scanned'
  max-confidence:
    description: 'Highest confidence score found'
  sarif-file:
    description: 'Path to generated SARIF file (when sarif-upload is enabled)'

runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Install scanner
      shell: bash
      run: npm install --no-save @forensicate/scanner@latest
      working-directory: ${{ github.action_path }}

    - name: Run scan
      id: scan
      shell: bash
      run: node ${{ github.action_path }}/scan.mjs
      env:
        INPUT_PATHS: ${{ inputs.paths }}
        INPUT_CONFIDENCE_THRESHOLD: ${{ inputs.confidence-threshold }}
        INPUT_FAIL_ON_FINDING: ${{ inputs.fail-on-finding }}
        INPUT_SCAN_MODE: ${{ inputs.scan-mode }}
        INPUT_COMMENT_ON_PR: ${{ inputs.comment-on-pr }}
        INPUT_SARIF_UPLOAD: ${{ inputs.sarif-upload }}
        INPUT_GITHUB_TOKEN: ${{ inputs.github-token }}

    - name: Upload SARIF to GitHub Security
      if: inputs.sarif-upload == 'true' && always()
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: forensicate-results.sarif
        category: forensicate-ai
      continue-on-error: true
